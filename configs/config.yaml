# ═══════════════════════════════════════════════════════════════
# Vision-Based Industrial Anomaly Detection - Configuration
# Research-Grade Framework (PatchCore + Hybrid Scoring)
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# Dataset Configuration
# ───────────────────────────────────────────────────────────────
dataset:
  name: "mvtec_ad"
  root_dir: "Data/mvtec_ad"
  kaggle_dataset: "alex000kim/mvtec-ad"
  categories:
    - "bottle"
    - "cable"
    - "capsule"
    - "carpet"
    - "grid"
    - "hazelnut"
    - "leather"
    - "metal_nut"
    - "pill"
    - "screw"
    - "tile"
    - "toothbrush"
    - "transistor"
    - "wood"
    - "zipper"
  image_size: 224
  # CPU optimization: 0 workers avoids multiprocessing issues on Windows
  num_workers: 0
  # No pin_memory on CPU — only useful with CUDA
  pin_memory: false

# ───────────────────────────────────────────────────────────────
# Model Configuration
# ───────────────────────────────────────────────────────────────
model:
  backbone: "resnet50"
  pretrained: true
  feature_dim: 2048
  projection_dim: 128
  # Increased from 256 to 512 per SimCLR paper recommendations
  projection_hidden_dim: 512

  # Multi-layer feature extraction (layer2 + layer3 + layer4)
  # Produces 512 + 1024 + 2048 = 3584-dim features for ResNet50
  multi_layer: true
  feature_layers:
    - "layer2"
    - "layer3"
    - "layer4"

  # Patch feature layers (for PatchCore-style detection)
  # layer2 (28x28) + layer3 (14x14) = multi-scale patch features
  patch_layers:
    - "layer2"
    - "layer3"

  # Feature extraction only mode — skip SimCLR training, use ImageNet features
  # This is the recommended mode (AUROC > 0.90 with PatchCore)
  feature_extraction_only: true

# ───────────────────────────────────────────────────────────────
# Patch-Based Anomaly Detection (PatchCore-style) — PRIMARY
# ───────────────────────────────────────────────────────────────
patch_detection:
  # Enable PatchCore pipeline (recommended for high AUROC)
  enabled: true

  # Coreset subsampling: keep this fraction of patches
  # Lower = faster inference + less memory, minimal AUROC impact
  coreset_ratio: 0.1
  coreset_max: 5000

  # PCA on patch features for dimensionality reduction
  use_pca: true
  pca_components: 256

# ───────────────────────────────────────────────────────────────
# Memory Bank Configuration (Global features — fallback mode)
# ───────────────────────────────────────────────────────────────
memory_bank:
  # Coreset subsampling for global features
  subsample: null

  # PCA dimensionality reduction for CPU efficiency
  use_pca: true
  pca_components: 200

# ───────────────────────────────────────────────────────────────
# Hybrid Scoring Configuration
# ───────────────────────────────────────────────────────────────
scoring:
  # kNN scoring (primary — most effective for PatchCore)
  k_neighbors: 3

  # Hybrid ensemble weights (must sum to > 0)
  # kNN is the primary scorer; Mahalanobis adds global distribution awareness
  weight_knn: 1.0
  weight_mahalanobis: 0.0
  weight_cosine: 0.0

# ───────────────────────────────────────────────────────────────
# Score Calibration (fix confidence issue)
# ───────────────────────────────────────────────────────────────
calibration:
  # "minmax", "minmax_sigmoid" (recommended), "temperature", "percentile"
  method: "minmax_sigmoid"
  temperature: 1.0
  percentile_low: 5.0
  percentile_high: 95.0

# ───────────────────────────────────────────────────────────────
# Anomaly Localization (Heatmaps)
# ───────────────────────────────────────────────────────────────
localization:
  # Gaussian smoothing sigma for heatmaps
  # Higher = smoother, lower = more detailed
  gaussian_sigma: 4.0
  colormap: "jet"
  overlay_alpha: 0.4

# ───────────────────────────────────────────────────────────────
# Contrastive Learning (SimCLR) Configuration
# Only used when model.feature_extraction_only = false
# ───────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  temperature: 0.07
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  # AMP is auto-disabled on CPU
  use_amp: true
  gradient_clip_max_norm: 1.0
  checkpoint_interval: 10
  seed: 42

  # Gradient accumulation (for effective larger batches on CPU)
  gradient_accumulation_steps: 1

  # Early stopping — stop training when loss plateaus
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001

  # Resume training from last checkpoint
  resume: false

# ───────────────────────────────────────────────────────────────
# Data Augmentation Configuration (Strong — SimCLR-style)
# ───────────────────────────────────────────────────────────────
augmentations:
  random_crop:
    enabled: true
    scale: [0.2, 1.0]

  horizontal_flip:
    enabled: true
    probability: 0.5

  # Strong color jitter (SimCLR-recommended)
  color_jitter:
    enabled: true
    probability: 0.8
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4
    hue: 0.1

  grayscale:
    enabled: true
    probability: 0.2

  gaussian_blur:
    enabled: true
    probability: 0.5
    kernel_size: 23

  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# ───────────────────────────────────────────────────────────────
# Anomaly Detection Configuration (Legacy — for global scorer)
# ───────────────────────────────────────────────────────────────
anomaly_detection:
  # "mahalanobis" (recommended) or "knn"
  method: "mahalanobis"
  k_neighbors: 5

  # Threshold: null = auto-calibrate, or set a fixed value
  score_threshold: null

# ───────────────────────────────────────────────────────────────
# Threshold Calibration
# ───────────────────────────────────────────────────────────────
thresholding:
  # "youden" (maximize TPR-FPR), "f1" (maximize F1), "percentile"
  method: "youden"
  # Percentile value (only used if method = "percentile")
  value: 97

# ───────────────────────────────────────────────────────────────
# Evaluation Configuration
# ───────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - "auroc"
    - "f1_score"
    - "accuracy"
    - "precision"
    - "recall"
    - "average_precision"
    - "pixel_auroc"
    - "pro_score"

# ───────────────────────────────────────────────────────────────
# Grad-CAM Configuration (legacy, kept for comparison)
# ───────────────────────────────────────────────────────────────
gradcam:
  target_layer: "layer3"
  colormap: "jet"

# ───────────────────────────────────────────────────────────────
# Output Configuration
# ───────────────────────────────────────────────────────────────
output:
  root_dir: "outputs"
  checkpoints_dir: "outputs/checkpoints"
  logs_dir: "outputs/logs"
  results_dir: "outputs/results"
  visualizations_dir: "outputs/visualizations"

# ───────────────────────────────────────────────────────────────
# Ablation Study Configuration
# ───────────────────────────────────────────────────────────────
ablation:
  # Toggle components for ablation experiments
  use_patch_detection: true
  use_pca: true
  use_coreset: true
  scoring_method: "knn"  # "knn", "mahalanobis", "cosine", "hybrid"
  feature_layers: ["layer2", "layer3"]