# ============================================================
# Vision-Based Industrial Anomaly Detection - IMPROVED CONFIG
# Thesis-Grade PatchCore + Stable SimCLR Hybrid
# ============================================================

dataset:
  name: "mvtec_ad"
  root_dir: "Data/mvtec_ad"

  categories:
    - "bottle"
    - "cable"
    - "capsule"
    - "carpet"
    - "grid"
    - "hazelnut"
    - "leather"
    - "metal_nut"
    - "pill"
    - "screw"
    - "tile"
    - "toothbrush"
    - "transistor"
    - "wood"
    - "zipper"

  # 🔥 FIX: critical improvement for PatchCore performance
  image_size: 224

  num_workers: 0
  pin_memory: false


# ============================================================
# MODEL (more stable feature representation)
# ============================================================
model:
  backbone: "resnet50"
  pretrained: true

  feature_dim: 2048

  # keep projection stable but slightly stronger
  projection_dim: 128
  projection_hidden_dim: 512

  multi_layer: true

  # KEEP same but now better supported by 224 resolution
  feature_layers:
    - "layer2"
    - "layer3"
    - "layer4"

  patch_layers:
    - "layer2"
    - "layer3"

  feature_extraction_only: true


# ============================================================
# PATCHCORE (CORE IMPROVEMENT AREA)
# ============================================================
patch_detection:
  enabled: true

  # 🔥 improved balance (less aggressive compression)
  coreset_ratio: 0.2
  coreset_max: 8000

  # 🔥 keep structure better (important for texture anomalies)
  use_pca: true
  pca_components: 128


# ============================================================
# MEMORY BANK (GLOBAL fallback improved stability)
# ============================================================
memory_bank:
  subsample: null

  use_pca: true

  # 🔥 aligned with patch PCA (prevents mismatch)
  pca_components: 128


# ============================================================
# SCORING (IMPORTANT IMPROVEMENT)
# ============================================================
scoring:
  # 🔥 increase stability of nearest neighbor scoring
  k_neighbors: 7

  weight_knn: 1.0
  weight_mahalanobis: 0.0
  weight_cosine: 0.0

  # optional future upgrade (safe to ignore now)
  image_score_aggregation:
    method: "topk_mean"
    topk_ratio: 0.02   # slightly more robust than 0.01


# ============================================================
# CALIBRATION (BIG THESIS IMPROVEMENT)
# ============================================================
calibration:

  # 🔥 BEST PRACTICE for anomaly separation
  method: "percentile"

  # stable threshold separation for MVTec
  percentile_low: 1.0
  percentile_high: 98.0

  temperature: 1.0


# ============================================================
# LOCALIZATION (HEATMAP QUALITY)
# ============================================================
localization:
  gaussian_sigma: 3.0   # sharper than 4.0 (better defect edges)
  colormap: "jet"
  overlay_alpha: 0.35


# ============================================================
# TRAINING (SimCLR optional)
# ============================================================
training:
  epochs: 50
  batch_size: 16

  optimizer:
    type: "adamw"
    lr: 0.0001
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    eta_min: 0.000001
    warmup_epochs: 3

  mixed_precision: false
  gradient_clip_norm: 1.0

  save_every: 5
  log_every: 10


# ============================================================
# EVALUATION (keep but slightly extended robustness)
# ============================================================
evaluation:
  compute_pixel_auroc: true
  compute_pro: true   # 🔥 important for thesis-level evaluation

  optimal_threshold_metric: "f1"

  confusion_matrix:
    enabled: true
    normalize: true
    threshold_strategy: "optimal"
    fixed_threshold: 0.5

  additional_metrics:
    accuracy: true
    precision: true
    recall: true
    specificity: true


# ============================================================
# PATHS (unchanged for compatibility)
# ============================================================
paths:
  checkpoints: "outputs/{category}/checkpoints"
  logs: "outputs/{category}/logs"
  results: "outputs/{category}/results"
  heatmaps: "outputs/{category}/heatmaps"
  confusion_matrix: "outputs/{category}/confusion_matrix"