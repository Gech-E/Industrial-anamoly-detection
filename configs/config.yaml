#  
# Vision-Based Industrial Anomaly Detection - Configuration
# (Optimized for ResNet50 + Patch-Based Detection)
#  

# Dataset Configuration
dataset:
  name: "mvtec_ad"
  root_dir: "Data/mvtec_ad"
  kaggle_dataset: "alex000kim/mvtec-ad"
  categories:
    - "bottle"
    - "cable"
    - "capsule"
    - "carpet"
    - "grid"
    - "hazelnut"
    - "leather"
    - "metal_nut"
    - "pill"
    - "screw"
    - "tile"
    - "toothbrush"
    - "transistor"
    - "wood"
    - "zipper"
  image_size: 224
  num_workers: 4

# 
# Model Configuration
# 
model:
  backbone: "resnet50"
  pretrained: true
  feature_dim: 2048
  projection_dim: 128
  projection_hidden_dim: 256

  # Patch-based detection
  use_patches: true
  patch_layer: "layer2"

  # 🔥 NEW: Feature compression (important for ResNet50)
  feature_compression: 512

# 
# Memory Bank Configuration
# 
memory_bank:
  subsample: 30000   # 🔥 reduced for ResNet50 (important)

# 
# Contrastive Learning (SimCLR) Configuration
# 
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  temperature: 0.07
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 10
  use_amp: true
  gradient_clip_max_norm: 1.0
  checkpoint_interval: 10
  seed: 42

# 
# Data Augmentation Configuration (Balanced - NOT too weak)
# 
augmentations:
  random_crop:
    enabled: false

  horizontal_flip:
    enabled: true
    probability: 0.5

  # 🔥 LIGHT jitter (important: not zero!)
  color_jitter:
    enabled: true
    probability: 0.3
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.02

  grayscale:
    enabled: false

  gaussian_blur:
    enabled: false

  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# 
# Anomaly Detection Configuration
# 
anomaly_detection:
  method: "knn"
  k_neighbors: 3

  score_aggregation: "max"

  score_threshold: null

  # 🔥 NEW: distance metric
  distance_metric: "euclidean"

# 
# Threshold Calibration
# 
thresholding:
  method: "percentile"
  value: 97   # 🔥 slightly stricter than 95

# 
# Evaluation Configuration
# 
evaluation:
  metrics:
    - "auroc"
    - "f1_score"
    - "accuracy"
    - "precision"
    - "recall"

# 
# Grad-CAM Configuration
# 
gradcam:
  target_layer: "layer3"   # 🔥 better for localization than layer4
  colormap: "jet"

# 
# Optional Preprocessing
# 
preprocessing:
  use_edge_channel: false

#  
# Output Configuration
#  
output:
  root_dir: "outputs"
  checkpoints_dir: "outputs/checkpoints"
  logs_dir: "outputs/logs"
  results_dir: "outputs/results"
  visualizations_dir: "outputs/visualizations"