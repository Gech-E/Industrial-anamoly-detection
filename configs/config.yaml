# ═══════════════════════════════════════════════════════════════
# Vision-Based Industrial Anomaly Detection - Configuration
# Production-Ready Pipeline (ResNet50 + Multi-Layer + Mahalanobis)
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# Dataset Configuration
# ───────────────────────────────────────────────────────────────
dataset:
  name: "mvtec_ad"
  root_dir: "Data/mvtec_ad"
  kaggle_dataset: "alex000kim/mvtec-ad"
  categories:
    - "bottle"
    - "cable"
    - "capsule"
    - "carpet"
    - "grid"
    - "hazelnut"
    - "leather"
    - "metal_nut"
    - "pill"
    - "screw"
    - "tile"
    - "toothbrush"
    - "transistor"
    - "wood"
    - "zipper"
  image_size: 224
  # CPU optimization: 0 workers avoids multiprocessing issues on Windows
  num_workers: 0
  # No pin_memory on CPU — only useful with CUDA
  pin_memory: false

# ───────────────────────────────────────────────────────────────
# Model Configuration
# ───────────────────────────────────────────────────────────────
model:
  backbone: "resnet50"
  pretrained: true
  feature_dim: 2048
  projection_dim: 128
  projection_hidden_dim: 256

  # Multi-layer feature extraction (layer2 + layer3 + layer4)
  # Produces 512 + 1024 + 2048 = 3584-dim features for ResNet50
  multi_layer: true
  feature_layers:
    - "layer2"
    - "layer3"
    - "layer4"

  # Feature extraction only mode — skip SimCLR training, use ImageNet features
  # This is the recommended mode for production (AUROC > 0.95 typical)
  feature_extraction_only: true

# ───────────────────────────────────────────────────────────────
# Memory Bank Configuration
# ───────────────────────────────────────────────────────────────
memory_bank:
  # Coreset subsampling: max number of features to keep (greedy k-center)
  # Set to null to keep all features
  subsample: null

  # PCA dimensionality reduction for CPU efficiency
  use_pca: true
  pca_components: 200

# ───────────────────────────────────────────────────────────────
# Contrastive Learning (SimCLR) Configuration
# Only used when model.feature_extraction_only = false
# ───────────────────────────────────────────────────────────────
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  temperature: 0.07
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  # AMP is auto-disabled on CPU
  use_amp: true
  gradient_clip_max_norm: 1.0
  checkpoint_interval: 10
  seed: 42

  # Early stopping — stop training when loss plateaus
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.001

  # Resume training from last checkpoint
  resume: false

# ───────────────────────────────────────────────────────────────
# Data Augmentation Configuration (Strong — SimCLR-style)
# ───────────────────────────────────────────────────────────────
augmentations:
  random_crop:
    enabled: true
    scale: [0.2, 1.0]

  horizontal_flip:
    enabled: true
    probability: 0.5

  # Strong color jitter (SimCLR-recommended)
  color_jitter:
    enabled: true
    probability: 0.8
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4
    hue: 0.1

  grayscale:
    enabled: true
    probability: 0.2

  gaussian_blur:
    enabled: true
    probability: 0.5
    kernel_size: 23

  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# ───────────────────────────────────────────────────────────────
# Anomaly Detection Configuration
# ───────────────────────────────────────────────────────────────
anomaly_detection:
  # "mahalanobis" (recommended) or "knn"
  method: "mahalanobis"
  k_neighbors: 5

  # Threshold: null = auto-calibrate, or set a fixed value
  score_threshold: null

# ───────────────────────────────────────────────────────────────
# Threshold Calibration
# ───────────────────────────────────────────────────────────────
thresholding:
  # "youden" (maximize TPR-FPR), "f1" (maximize F1), "percentile"
  method: "youden"
  # Percentile value (only used if method = "percentile")
  value: 97

# ───────────────────────────────────────────────────────────────
# Evaluation Configuration
# ───────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - "auroc"
    - "f1_score"
    - "accuracy"
    - "precision"
    - "recall"
    - "average_precision"

# ───────────────────────────────────────────────────────────────
# Grad-CAM Configuration
# ───────────────────────────────────────────────────────────────
gradcam:
  target_layer: "layer3"
  colormap: "jet"

# ───────────────────────────────────────────────────────────────
# Output Configuration
# ───────────────────────────────────────────────────────────────
output:
  root_dir: "outputs"
  checkpoints_dir: "outputs/checkpoints"
  logs_dir: "outputs/logs"
  results_dir: "outputs/results"
  visualizations_dir: "outputs/visualizations"